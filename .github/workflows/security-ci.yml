name: Security CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies with hash verification
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
          pip-sync requirements.txt || pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --strict --require-hashes || true

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-report.json --severity-level high || true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan . > .secrets.baseline || true

      - name: Run tests with coverage
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx websockets
          pytest tests/ --cov=backend --cov-report=xml --cov-fail-under=50

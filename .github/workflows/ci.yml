# ──────────────────────────────────────────────────────────────────────────────
# QVis CI Pipeline — lint, test, build, security scan
#
# Jobs:
#   1. lint        — ruff (style + logic errors)
#   2. test        — pytest with coverage, multiple Python versions
#   3. build       — Docker build validation
#   4. security    — bandit (SAST), dependency audit
#   5. merge-gate  — aggregates all job results (required for merge)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  DEMO_MODE: "true"
  USE_MOCK: "true"

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check (errors)
        run: ruff check backend/ tests/ --select=E,F,W --ignore=E501

      - name: ruff format check
        run: ruff format --check backend/ tests/

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qvis_test
          POSTGRES_PASSWORD: qvis_test
          POSTGRES_DB: qvis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U qvis_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-timeout ruff

      - name: Run unit tests (SQLite)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///data/qvis.db"
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_health.py \
            -v \
            --tb=short \
            --timeout=120 \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml \
            -q

      - name: Run Alembic migration tests (PostgreSQL)
        env:
          DATABASE_URL: "postgresql+asyncpg://qvis_test:qvis_test@localhost:5432/qvis_test"
        run: |
          pip install asyncpg
          python -m pytest tests/test_alembic.py -v --tb=short --timeout=60 -q
        continue-on-error: true

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: qvis:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and health passes
        run: |
          docker run -d --name qvis-smoke \
            -e DEMO_MODE=true \
            -e USE_MOCK=true \
            -p 8000:8000 \
            qvis:test

          # Wait for health check (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health/live > /dev/null 2>&1; then
              echo "✓ Health check passed after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "✗ Health check timed out"
              docker logs qvis-smoke
              exit 1
            fi
            sleep 1
          done

          # Verify key endpoints
          curl -sf http://localhost:8000/api/health | python -m json.tool
          curl -sf http://localhost:8000/api/health/ready | python -m json.tool
          curl -sf http://localhost:8000/api/health/live | python -m json.tool

          docker rm -f qvis-smoke

  # ── 4. Security ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Bandit (SAST)
        run: bandit -r backend/ -ll -i -x backend/__pycache__
        continue-on-error: true

      - name: Safety (dependency audit)
        run: |
          pip freeze > /tmp/frozen.txt
          safety check --full-report --file /tmp/frozen.txt || true
        continue-on-error: true

  # ── 5. Merge Gate ─────────────────────────────────────────────────────────
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [lint, test, build, security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "lint:      ${{ needs.lint.result }}"
          echo "test:      ${{ needs.test.result }}"
          echo "build:     ${{ needs.build.result }}"
          echo "security:  ${{ needs.security.result }}"

          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "✗ Merge gate FAILED — one or more required jobs failed"
            exit 1
          fi

          echo "✓ Merge gate PASSED"

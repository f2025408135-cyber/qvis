name: QVis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DEMO_MODE: "true"
  USE_MOCK: "true"
  DATABASE_URL: "sqlite:///./data/test_qvis.db"
  LOG_FORMAT: "console"
  LOG_LEVEL: "WARNING"

jobs:
  # ─── Python Backend ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy
      - name: Ruff lint
        run: ruff check backend/ tests/
      - name: Ruff format check
        run: ruff format --check backend/ tests/
      - name: Mypy type check
        run: mypy backend/ --ignore-missing-imports --strict

  backend-security:
    name: Backend — Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Bandit security scan
        run: bandit -r backend/ -ll -x backend/tests

  backend-test:
    name: Backend — Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - name: Create data directory
        run: mkdir -p data
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v \
            --tb=short
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  backend-test-matrix:
    name: Backend — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio
      - run: mkdir -p data
      - run: pytest tests/ -x --tb=short

  # ─── Docker Build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t qvis:ci .
      - name: Verify image starts
        run: |
          docker run -d --name qvis-test \
            -e DEMO_MODE=true \
            -e USE_MOCK=true \
            -p 8000:8000 \
            qvis:ci
          sleep 10
          curl -f http://localhost:8000/live || exit 1
          docker stop qvis-test

  # ─── All Jobs Must Pass ────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate — All Required Jobs
    needs: [backend-lint, backend-security, backend-test, docker-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-security.result }}" != "success" ]] || \
             [[ "${{ needs.backend-test.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qvis-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "qvis-service"
spec:
  rules:
  - host: qvis.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qvis-service
            port:
              number: 80

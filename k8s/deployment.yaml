apiVersion: apps/v1
kind: Deployment
metadata:
  name: qvis-backend
  labels:
    app: qvis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qvis
  template:
    metadata:
      labels:
        app: qvis
    spec:
      containers:
      - name: qvis-api
        image: ghcr.io/f2025408135-cyber/qvis:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: qvis-secrets
              key: database_url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: qvis-secrets
              key: redis_url
        - name: QVIS_AUTH_ENABLED
          value: "true"
        livenessProbe:
          httpGet:
            path: /api/live
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

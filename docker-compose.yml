# ──────────────────────────────────────────────────────────────────────────────
# QVis — Quantum Threat Topology Engine
# Docker Compose configuration
# ──────────────────────────────────────────────────────────────────────────────

services:
  qvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qvis-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database and runtime data across container restarts
      - qvis-data:/app/.qvis-data
    environment:
      # ── Application Mode ──────────────────────────────────────────────
      # Set to "false" to connect to real IBM Quantum (requires IBM_QUANTUM_TOKEN)
      - DEMO_MODE=true

      # ── Database ─────────────────────────────────────────────────────
      # Default: SQLite (embedded).  Set DATABASE_URL to switch to PostgreSQL.
      #   SQLite (default):  (omit or leave empty)
      #   PostgreSQL:        postgresql+asyncpg://qvis:qvis@postgres:5432/qvis
      - DATABASE_URL=${DATABASE_URL:-}

      # ── Telemetry ─────────────────────────────────────────────────────
      # How often (seconds) the backend collects and broadcasts new telemetry
      - UPDATE_INTERVAL_SECONDS=30

      # ── IBM Quantum (optional) ───────────────────────────────────────
      # Your IBM Quantum API token from https://quantum.ibm.com/account
      - IBM_QUANTUM_TOKEN=${IBM_QUANTUM_TOKEN:-}

      # ── AWS Braket (optional, planned) ────────────────────────────────
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}

      # ── Azure Quantum (optional, planned) ─────────────────────────────
      - AZURE_QUANTUM_SUBSCRIPTION_ID=${AZURE_QUANTUM_SUBSCRIPTION_ID:-}

      # ── GitHub Token Scanning (optional) ──────────────────────────────
      # GitHub PAT with 'repo' scope for scanning exposed quantum tokens
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

      # ── Authentication ────────────────────────────────────────────────
      # Set to "true" to require API key for protected endpoints
      - AUTH_ENABLED=false
      # Shared secret API key for endpoint and WebSocket authentication
      - API_KEY=${API_KEY:-}

      # ── Rate Limiting ─────────────────────────────────────────────────
      # Format: <max_requests>/<period_seconds>
      - RATE_LIMIT=60/60

      # ── Logging ───────────────────────────────────────────────────────
      # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
      - LOG_LEVEL=INFO
      # Options: console, json
      - LOG_FORMAT=console

      # ── CORS ──────────────────────────────────────────────────────────
      # Comma-separated list of allowed origins (or "*" for all)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}

      # ── Alerting Webhooks (optional) ──────────────────────────────────
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp:size=64M,noexec

volumes:
  qvis-data:
    driver: local

  # ── PostgreSQL (optional — uncomment to use instead of SQLite) ──────
  # To activate: set DATABASE_URL=postgresql+asyncpg://qvis:qvis@postgres:5432/qvis
  # in the qvis service environment above, then uncomment the postgres service below.
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: qvis-postgres
  #   restart: unless-stopped

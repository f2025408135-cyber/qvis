# ──────────────────────────────────────────────────────────────────────────────
# QVis — Alembic Migration Configuration
# ──────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts relative to this ini file.
script_location = %(here)s/alembic

# Prepend project root to sys.path so env.py can import backend modules.
prepend_sys_path = .

# Use timestamp-based migration file names for chronological ordering.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

path_separator = os

# ── Database URL ─────────────────────────────────────────────────────────────
# Read from DATABASE_URL environment variable.  Falls back to the SQLite default
# when the variable is not set (development / demo mode).
#
# Examples:
#   SQLite:    sqlite+aiosqlite:///data/qvis.db
#   PostgreSQL: postgresql+asyncpg://user:pass@localhost:5432/qvis
# ─────────────────────────────────────────────────────────────────────────────
sqlalchemy.url = sqlite+aiosqlite:///data/qvis.db


[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
